<!doctype html>
<html lang="ca">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="robots" content="noindex" />
    <meta name="theme-color" content="#251f1a" />
    <title>La carta · Casa Alejandro</title>
    <style>
      :root {
        color: #f8f2e9;
        background: #251f1a;
        font-family: "Source Sans 3", Arial, sans-serif;
        --wine: #8b283d;
        --gold: #c7a24b;
        --paper: #f3ebdd;
      }

      * { box-sizing: border-box; }
      body { min-width: 320px; min-height: 100svh; margin: 0; }
      a { color: inherit; text-decoration: none; }

      main {
        display: grid;
        min-height: 100svh;
        place-items: center;
        padding: clamp(1.5rem, 5vw, 5rem);
      }

      article {
        width: min(56rem, 100%);
        padding: clamp(2rem, 7vw, 6rem);
        border: 1px solid rgba(199, 162, 75, 0.62);
        text-align: center;
      }

      .brand {
        display: block;
        color: var(--paper);
        font-family: Georgia, serif;
        font-size: clamp(1.15rem, 3vw, 1.8rem);
        letter-spacing: 0.08em;
        text-transform: uppercase;
      }

      .brand small {
        display: block;
        margin-top: 0.65rem;
        color: var(--gold);
        font-family: Arial, sans-serif;
        font-size: 0.64rem;
        font-weight: 700;
        letter-spacing: 0.28em;
      }

      .rule {
        display: block;
        width: 8rem;
        height: 1px;
        margin: clamp(2rem, 5vw, 3.5rem) auto;
        background: var(--gold);
      }

      h1 {
        max-width: 10ch;
        margin: 0 auto 1.5rem;
        font-family: Georgia, serif;
        font-size: clamp(3rem, 9vw, 6.5rem);
        font-weight: 400;
        line-height: 0.94;
        letter-spacing: -0.045em;
      }

      p {
        max-width: 38rem;
        margin: 0 auto;
        color: #d8cfc4;
        font-size: clamp(1rem, 2vw, 1.2rem);
        line-height: 1.6;
      }

      p + p { margin-top: 0.75rem; }

      .actions {
        display: flex;
        flex-wrap: wrap;
        justify-content: center;
        gap: 0.75rem;
        margin-top: 2.4rem;
      }

      .button {
        display: inline-flex;
        min-height: 3.5rem;
        align-items: center;
        justify-content: center;
        padding: 0.9rem 1.5rem;
        border: 1px solid var(--gold);
        font-weight: 700;
      }

      .button:first-child {
        border-color: var(--wine);
        background: var(--wine);
      }
    </style>
  </head>
  <body>
    <main>
      <article>
        <a class="brand" href="../">
          Casa Alejandro
          <small>Reus · des de 1999</small>
        </a>
        <span class="rule" aria-hidden="true"></span>
        <h1>La carta</h1>
        <p>Estem preparant la nova carta professional. Molt aviat la podràs consultar aquí.</p>
        <p>Estamos preparando la nueva carta profesional. Muy pronto podrás consultarla aquí.</p>
        <div class="actions">
          <a class="button" href="../">Tornar a l’inici</a>
          <a class="button" href="tel:+34977773039">977 77 30 39</a>
        </div>
      </article>
    </main>
  </body>
</html>
